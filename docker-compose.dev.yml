  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5
    networks:
      app-network:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      app-network:

volumes:
  mongo_data:

networks:
  app-network: